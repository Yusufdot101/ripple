services:
    chat-api:
        build:
            context: .
        ports:
            - "8081:8081"
        env_file:
            - ./config/docker.env
        depends_on:
            chat-postgres:
                condition: service_healthy
        networks:
            - ripple-chat-service-net

    chat-postgres:
        image: postgres:18.3
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: ripple-chat
        volumes:
            - chat-pgdata:/var/lib/postgresql
            - ./docker/postgres:/docker-entrypoint-initdb.d
        networks:
            - ripple-chat-service-net

volumes:
    chat-pgdata:

networks:
    ripple-chat-service-net:
        driver: bridge
